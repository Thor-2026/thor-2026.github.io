<div class="card">

<h2>🖼 Branding Manager</h2>

<label>Company Name</label>

<input
type="text"
id="companyName"
class="input"
placeholder="Company Name">

<br><br>

<label>Welcome Message</label>

<input
type="text"
id="welcomeText"
class="input"
placeholder="Welcome Message">

<br><br>

<button id="saveBranding">
💾 Save Branding
</button>

<hr>

<h3>Company Logo</h3>

<input
type="file"
id="logoFile"
accept="image/*">

<br><br>

<img
id="logoPreview"
style="max-width:250px;
display:none;
border-radius:10px;">

<br><br>

<button id="uploadLogo">

Upload Logo

</button>

<hr>

<h3>Background Image</h3>

<input
type="file"
id="backgroundFile"
accept="image/*">

<br><br>

<img
id="backgroundPreview"
style="max-width:350px;
display:none;
border-radius:10px;">

<br><br>

<button id="uploadBackground">

Upload Background

</button>

</div>
