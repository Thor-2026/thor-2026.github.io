<h1>⚙ System Settings</h1>

<div class="card">

    <h2>Display Settings</h2>

    <label>Display Title</label>

    <input
        type="text"
        id="displayTitle"
        placeholder="SHIFT SCHEDULE">

    <br><br>

    <label>Auto Refresh (minutes)</label>

    <input
        type="number"
        id="refreshMinutes">

    <br><br>

    <label>Announcement Rotation (seconds)</label>

    <input
        type="number"
        id="announcementSeconds">

    <br><br>

    <label>Clock Format</label>

    <select id="clockFormat">

        <option value="12">

            12 Hour

        </option>

        <option value="24">

            24 Hour

        </option>

    </select>

    <br><br>

    <label>Temperature Unit</label>

    <select id="temperatureUnit">

        <option value="C">

            Celsius (°C)

        </option>

        <option value="F">

            Fahrenheit (°F)

        </option>

    </select>

    <br><br>

    <button
        id="saveSettings"
        class="primary-btn">

        💾 Save Settings

    </button>

</div>

<br>

<div class="card">

    <h2>🔒 Change My Password</h2>

    <p>

        Change your own account password at any time.

    </p>

    <label>New Password</label>

    <input
        type="password"
        id="newPassword"
        autocomplete="new-password">

    <br><br>

    <label>Confirm Password</label>

    <input
        type="password"
        id="confirmPassword"
        autocomplete="new-password">

    <br><br>

    <button
        id="changePasswordBtn"
        class="primary-btn">

        Change Password

    </button>

</div>
