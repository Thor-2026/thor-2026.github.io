<div class="card">

    <h2>Ticker Manager</h2>

    <label>Scrolling Message</label>

    <textarea
        id="tickerMessage"
        rows="6"
        placeholder="Enter ticker text..."
    ></textarea>

    <br><br>

    <label class="checkbox">

        <input
            type="checkbox"
            id="tickerEnabled"
        >

        Enable Ticker

    </label>

    <br><br>

    <button id="saveTicker">

        Save Ticker

    </button>

</div>
