<!-- Custom Inventory Form Overlay Modal Container Layout -->
<div id="customUpdateModalContainer" style="display: none;">
    <div class="inv-modal-backdrop">
        <div class="inv-modal-content" style="max-width: 550px;">
            <div class="inv-modal-header" id="modal-header-accent" style="background: #2563eb;">
                <span id="modal-title-text">Update Count Matrix</span>
                <button type="button" class="inv-modal-close" onclick="closeCustomModal()">&times;</button>
            </div>
            <form id="stock-update-form">
                <div class="inv-modal-body" style="background: #f8fafc; padding: 20px;">
                    <!-- Context Hidden Values -->
                    <input type="hidden" id="modal-part-code">
                    <input type="hidden" id="modal-supplier-id">
                    <input type="hidden" id="modal-supplier-name">
                    <input type="hidden" id="modal-qty-per-box">
                    
                    <!-- Base Metrics Insight Header -->
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #ffffff; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 20px; font-size: 14px;">
                        <div>
                            <span style="display:block; font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase;">Calibration Rule:</span>
                            <strong id="modal-box-qty-badge" style="color:#0f172a;">--</strong> labels/box
                        </div>
                        <div>
                            <span style="display:block; font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase;">Current System Balance:</span>
                            <strong id="modal-current-bal-badge" style="color:#2563eb;">--</strong> labels
                        </div>
                    </div>

                    <!-- Operational Mode Selection Row -->
                    <label class="inv-label" style="font-size: 13px; text-transform: uppercase; color:#475569; letter-spacing: 0.05em;">Select Action Profile Mode:</label>
                    <div style="display: flex; gap: 8px; margin-bottom: 20px;" id="modal-mode-selector-wrapper">
                        <button type="button" id="btn-mode-deduct" class="btn-shortcut" style="flex:1; border-color:#2563eb; background:#eff6ff; color:#1e40af; padding:12px;" onclick="switchInventoryModalMode('DEDUCT')">📤 Deduct Usage</button>
                        <button type="button" id="btn-mode-add" class="btn-shortcut" style="flex:1; padding:12px;" onclick="switchInventoryModalMode('ADD')">📥 Add Incoming</button>
                        <button type="button" id="btn-mode-correct" class="btn-shortcut" style="flex:1; padding:12px;" onclick="switchInventoryModalMode('CORRECT')">🛠️ Fix / Overwrite</button>
                    </div>

                    <!-- Operator End of Run Quick Calculators -->
                    <div id="operator-shortcut-block" style="margin-bottom: 15px;">
                        <span style="display:block; font-size: 12px; font-weight:700; color:#64748b; margin-bottom:6px;">End of Run Fast Templates:</span>
                        <div class="shortcut-row" style="margin-bottom: 0;">
                            <button type="button" class="btn-shortcut" onclick="applyBoxLeftShortcut()">📦 Box Left Only (0 Full / 500 Loose)</button>
                            <button type="button" class="btn-shortcut" onclick="applyShiftEndShortcut()">⏱️ Clear / Shift End (0 / 0)</button>
                        </div>
                    </div>

                    <!-- Primary Quantitative Count Input Blocks -->
                    <div style="background:#ffffff; padding:18px; border:2px solid #cbd5e1; border-radius:8px;">
                        <div style="margin-bottom: 16px;">
                            <label for="input-full-boxes" id="label-full-boxes" class="inv-label" style="font-size:15px;">How many FULL boxes are you deducting?</label>
                            <input type="number" class="inv-form-control" id="input-full-boxes" min="0" value="0" required oninput="calculateLiveMathConfirmation()">
                        </div>
                        <div>
                            <label for="input-loose-labels" id="label-loose-labels" class="inv-label" style="font-size:15px;">How many LOOSE labels are you deducting?</label>
                            <input type="number" class="inv-form-control" id="input-loose-labels" min="0" value="0" required oninput="calculateLiveMathConfirmation()">
                        </div>
                    </div>

                    <!-- Live Math Interlocking Confirmation Banner -->
                    <div id="live-math-banner" style="margin-top: 18px; padding: 14px; border-radius: 6px; font-size: 14px; font-weight: 700; text-align: center; background:#f1f5f9; border:1px solid #cbd5e1; color:#334155;">
                        Enter values above to verify balance calculations...
                    </div>
                </div>
                <div class="inv-modal-footer">
                    <button type="button" class="inv-btn-can" onclick="closeCustomModal()">Cancel</button>
                    <button type="submit" class="inv-btn-sub" id="submit-count-btn" style="background:#2563eb;">Confirm Action</button>
                </div>
            </form>
        </div>
    </div>
</div>
