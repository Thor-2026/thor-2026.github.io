<h1>📢 Announcements Manager</h1>

<div class="announcement-layout">

    <!-- LEFT PANEL -->

    <div class="announcement-sidebar">

        <div class="announcement-header">

            <h2>Announcements</h2>

            <button id="newAnnouncement">
                ➕ New
            </button>

        </div>

        <div id="announcementList">

            Loading...

        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="announcement-editor">

        <div class="card">

            <h2 id="editorTitle">
                New Announcement
            </h2>

            <label>Title</label>

            <input
                type="text"
                id="announcementTitle"
                placeholder="Safety Meeting">

            <br><br>

            <label>Message</label>

            <textarea
                id="announcementMessage"
                rows="8"
                placeholder="Meeting today at 2 PM in lunch room"></textarea>

            <br><br>

            <label>

                <input
                    type="checkbox"
                    id="announcementEnabled"
                    checked>

                Enabled

            </label>

            <br><br>

            <div class="button-row">

                <button id="saveAnnouncement">

                    💾 Save

                </button>

                <button id="deleteAnnouncement">

                    🗑 Delete

                </button>

                <button id="cancelEdit">

                    Cancel

                </button>

            </div>

            <p id="announcementStatus"></p>

        </div>

    </div>

</div>
