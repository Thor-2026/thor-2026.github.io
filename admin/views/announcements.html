<h1>📢 Announcements Manager</h1>

<div class="card">

    <h3>Add / Edit Announcement</h3>

    <div class="form-group">
        <label>Title</label>
        <input
            type="text"
            id="title"
            placeholder="Announcement title">
    </div>

    <div class="form-group">
        <label>Message</label>
        <textarea
            id="message"
            rows="4"
            placeholder="Announcement message"></textarea>
    </div>

    <div class="form-group checkbox-group">

        <label for="enabled">
            <input
                type="checkbox"
                id="enabled"
                checked>

            Enabled
        </label>

    </div>

    <div class="form-group">

        <label>Sort Order</label>

        <input
            type="number"
            id="sortOrder"
            value="1">

    </div>

    <button id="saveAnnouncement">
        💾 Save Announcement
    </button>

    <button
        id="cancelEdit"
        style="display:none;">
        Cancel Edit
    </button>

</div>

<br>

<div class="card">

    <h3>Current Announcements</h3>

    <div id="announcementList">

        Loading...

    </div>

</div>
