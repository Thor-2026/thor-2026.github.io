<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 mb-0">Schedule Manager</h2>
        <div class="d-flex align-items-center gap-2" style="max-width: 300px;">
            <label for="rotationInterval" class="form-label text-nowrap mb-0 small text-muted">Rotation Interval (sec):</label>
            <input type="number" id="rotationInterval" class="form-control form-control-sm text-center" min="2" value="5" style="width: 80px;">
            <button id="saveIntervalBtn" class="btn btn-sm btn-primary">Save Interval</button>
        </div>
    </div>

    <!-- 5 Fixed Slots Grid Matrix -->
    <div class="row g-3" id="scheduleSlotsContainer">
        <!-- Slot 1 -->
        <div class="col-xl-4 col-md-6">
            <div class="card h-100 shadow-sm border-0 slot-card" data-slot="1">
                <div class="card-header bg-light d-flex justify-content-between align-items-center py-2">
                    <span class="fw-semibold small text-secondary">Slot 1</span>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input slot-toggle" type="checkbox" id="toggle-slot-1">
                        <label class="form-check-label small text-muted" for="toggle-slot-1">Enable</label>
                    </div>
                </div>
                <div class="card-body d-flex flex-column justify-content-between text-center p-3">
                    <div class="preview-box border rounded mb-3 d-flex align-items-center justify-content-center bg-dark position-relative overflow-hidden" style="height: 160px;">
                        <img id="preview-img-1" src="" alt="No Image" class="img-fluid w-100 h-100 object-fit-cover d-none">
                        <div id="placeholder-1" class="text-muted small p-2">No Active Media Asset</div>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-secondary flex-grow-1 position-relative">
                            <i class="bi bi-upload me-1"></i> Upload / Replace
                            <input type="file" class="position-absolute top-0 start-0 w-100 h-100 opacity-0 file-input" accept="image/*" style="cursor: pointer;">
                        </button>
                        <button class="btn btn-sm btn-light border btn-preview-modal" data-slot="1">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Slot 2 -->
        <div class="col-xl-4 col-md-6">
            <div class="card h-100 shadow-sm border-0 slot-card" data-slot="2">

                    </div>

<!-- Preview Lightbox Modal -->
<div class="modal fade" id="schedulePreviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-dark border-0">
            <div class="modal-header border-0 pb-0" data-bs-theme="dark">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center p-4 pt-0">
                <img id="modalPreviewImage" src="" class="img-fluid rounded max-vh-75 shadow" alt="Schedule Full Preview">
            </div>
        </div>
    </div>
</div>
