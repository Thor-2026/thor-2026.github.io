<h1>📄 Schedule Slideshow Manager</h1>

<div class="cards" style="display: flex; flex-direction: column; gap: 24px; width: 100%;">
    
    <!-- Timing Speed Form Card Wrapper -->
    <div class="card" style="width: 100%; box-sizing: border-box;">
        <h3>Slideshow Rotation Timing</h3>
        <div style="display: flex; align-items: center; gap: 12px; margin-top: 10px;">
            <label for="rotationInterval" style="font-weight: 600; font-size: 14px;">Rotation Interval (seconds):</label>
            <input type="number" id="rotationInterval" min="2" value="5" style="width: 70px; padding: 6px; border: 1px solid #ccc; border-radius: 6px; text-align: center;">
            <button id="saveIntervalBtn" style="padding: 6px 16px; cursor: pointer; font-weight: 600;">Save Timing</button>
        </div>
    </div>

    <!-- Interactive Grid Layout Canvas Box -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%;">
        
        <!-- Slot 1 -->
        <div class="card slot-card" data-slot="1" style="margin: 0; display: flex; flex-direction: column; justify-content: space-between;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h3 style="margin:0;">Slot 1</h3>
                <label style="font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                    <input type="checkbox" id="toggle-slot-1" class="slot-toggle"> Enable
                </label>
            </div>
            <div style="height: 150px; background: #1e293b; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 12px; position: relative;">
                <img id="preview-img-1" src="" style="width:100%; height:100%; object-fit: contain; display:none;">
                <span id="placeholder-1" style="color:#64748b; font-size:13px;">Empty Media Slot</span>
            </div>
            <div style="display: flex; gap: 8px;">
                <div style="position: relative; flex-grow: 1; text-align: center; background: #eee; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; border: 1px solid #000000;">
                    Choose Image
                    <input type="file" class="file-input" accept="image/*" style="position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;">
                </div>
                <button class="btn-preview-modal" data-slot="1" style="padding: 0 12px; cursor:pointer;">👁️</button>
            </div>
        </div>

        <!-- Slot 2 -->

<!-- Modal Full Preview Overlay Dialog Layer -->
<div id="simplePreviewLightbox" style="display: none; position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(15, 23, 42, 0.95); z-index: 999999; justify-content: center; align-items: center; cursor: pointer;" onclick="this.style.display='none'">
    <img id="lightboxTargetImage" src="" style="max-width: 95%; max-height: 90vh; border-radius: 6px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); object-fit: contain;">
    <div style="position: absolute; top: 25px; right: 30px; color: white; font-size: 32px; font-weight: 300;">&times;</div>
</div>
