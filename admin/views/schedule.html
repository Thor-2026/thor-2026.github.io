<div class="row">
    <div class="col-12">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom">
                <div>
                    <h5 class="mb-0 text-dark fw-bold">Schedule Slideshow Manager</h5>
                    <small class="text-muted">Manage up to 5 fixed slots rotating with Ken Burns zoom effects</small>
                </div>
                <div class="d-flex align-items-center gap-2 bg-light p-2 rounded border" style="max-width: 320px;">
                    <label for="rotationInterval" class="form-label text-nowrap mb-0 small fw-semibold text-secondary">Rotation (sec):</label>
                    <input type="number" id="rotationInterval" class="form-control form-control-sm text-center" min="2" value="5" style="width: 70px;">
                    <button id="saveIntervalBtn" class="btn btn-sm btn-primary fw-semibold px-3">Save</button>
                </div>
            </div>
            
            <div class="card-body bg-light p-4">
                <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="scheduleSlotsContainer">
                    
                    <!-- Slot 1 -->
                    <div class="col">
                        <div class="card h-100 shadow-sm border-0 slot-card" data-slot="1">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center py-2 border-bottom-0">
                                <span class="fw-bold text-dark small">Slot 1</span>
                                <div class="form-check form-switch m-0">
                                    <input class="form-check-input slot-toggle" type="checkbox" id="toggle-slot-1">
                                    <label class="form-check-label small text-muted fw-medium" for="toggle-slot-1">Enable</label>
                                </div>
                            </div>
                            <div class="card-body p-3 pt-1 d-flex flex-column">
                                <div class="preview-box border rounded mb-3 d-flex align-items-center justify-content-center bg-dark position-relative overflow-hidden" style="height: 160px;">
                                    <img id="preview-img-1" src="" alt="Preview" class="img-fluid w-100 h-100 object-fit-cover d-none">
                                    <div id="placeholder-1" class="text-white-50 small p-2 text-center">
                                        <i class="bi bi-image d-block mb-1 h4"></i> No Media Asset
                                    </div>
                                </div>
                                <div class="d-flex gap-2 mt-auto">
                                    <button class="btn btn-sm btn-outline-primary flex-grow-1 position-relative fw-semibold">
                                        <i class="bi bi-upload me-1"></i> Upload Image
                                        <input type="file" class="position-absolute top-0 start-0 w-100 h-100 opacity-0 file-input" accept="image/*" style="cursor: pointer;">
                                    </button>
                                    <button class="btn btn-sm btn-outline-secondary btn-preview-modal" data-slot="1">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Slot 2 -->
                    <div class="col">
                        <div class="card h-100 shadow-sm border-0 slot-card" data-slot="2">

</div>

<!-- Lightbox Modal View -->
<div class="modal fade" id="schedulePreviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-dark border-0">
            <div class="modal-header border-0 pb-0" data-bs-theme="dark">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center p-4 pt-0">
                <img id="modalPreviewImage" src="" class="img-fluid rounded max-vh-75 shadow" alt="Preview Layout">
            </div>
        </div>
    </div>
</div>
