<div class="page-header">

    <h1>👥 Team Management</h1>

    <button
        id="newUserBtn"
        class="primary-btn">

        + New User

    </button>

</div>

<!-- ======================================
Tabs
====================================== -->

<div class="team-tabs">

    <button
        class="tab active"
        data-tab="users">

        Users

    </button>

    <button
        class="tab"
        data-tab="permissions">

        Permissions

    </button>

    <button
        class="tab"
        data-tab="activity">

        Activity Log

    </button>

</div>

<!-- ======================================
Content
====================================== -->

<div id="teamContent">

    <!-- ======================================
    Users
    ====================================== -->

    <section
        id="usersView"
        class="team-view">

        <table class="team-table">

            <thead>

                <tr>

                    <th>Name</th>

                    <th>Username</th>

                    <th>Role</th>

                    <th>Status</th>

                    <th></th>

                </tr>

            </thead>

            <tbody id="usersTable">

                <tr>

                    <td colspan="5">

                        Loading...

                    </td>

                </tr>

            </tbody>

        </table>

    </section>

    <!-- ======================================
    Permissions
    ====================================== -->

    <section
        id="permissionsView"
        class="team-view"
        style="display:none;">

        <div class="empty-panel">

            <h2>Permissions</h2>

            <p>

                Permissions management will be added
                in the next phase.

            </p>

        </div>

    </section>

    <!-- ======================================
    Activity
    ====================================== -->

    <section
        id="activityView"
        class="team-view"
        style="display:none;">

        <div class="empty-panel">

            <h2>Activity Log</h2>

            <p>

                Activity history will be available
                in a future update.

            </p>

        </div>

    </section>

</div>

<!-- ======================================
Slide Editor
====================================== -->

<aside
    id="userEditor"
    class="user-editor">

    <!-- Header -->

    <div class="editor-header">

        <h2>User Details</h2>

        <button
            id="closeEditor"
            type="button">

            ✕

        </button>

    </div>

    <!-- Body -->

    <div class="editor-body">

        <label for="editFullName">

            Full Name

        </label>

        <input
            id="editFullName"
            type="text">

        <label for="editUsername">

            Username

        </label>

        <input
            id="editUsername"
            type="text">

        <label for="editRole">

            Role

        </label>

        <select id="editRole">

            <option value="">

                Loading...

            </option>

        </select>

        <label for="editStatus">

            Status

        </label>

        <select id="editStatus">

            <option value="true">

                Active

            </option>

            <option value="false">

                Disabled

            </option>

        </select>

        <div class="editor-buttons">

            <button
                id="saveUserBtn"
                class="primary-btn"
                type="button">

                Save Changes

            </button>

            <button
                id="resetPasswordBtn"
                type="button">

                Reset Password

            </button>

            <button
                id="deleteUserBtn"
                class="danger-btn"
                type="button">

                Delete User

            </button>

        </div>

        <hr>

        <h2>Create User</h2>

        <label for="newFullName">

            Full Name

        </label>

        <input
            id="newFullName"
            type="text">

        <label for="newUsername">

            Username

        </label>

        <input
            id="newUsername"
            type="text">

        <label for="newRole">

            Role

        </label>

        <select id="newRole">

            <option value="">

                Loading...

            </option>

        </select>

        <button
            id="createUserBtn"
            class="primary-btn"
            type="button">

            Create User

        </button>

        <div id="newUserPassword"></div>

    </div>

    </aside>
