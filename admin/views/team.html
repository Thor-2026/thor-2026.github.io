<div class="page-header">

    <h1>👥 Team Management</h1>

    <button id="newUserBtn" class="primary-btn">

        + New User

    </button>

</div>

<div class="team-tabs">

    <button class="tab active"
            data-tab="users">

        Users

    </button>

    <button class="tab"
            data-tab="permissions">

        Permissions

    </button>

    <button class="tab"
            data-tab="activity">

        Activity Log

    </button>

</div>

<div id="teamContent">

    <div id="usersView">

        <table class="team-table">

            <thead>

                <tr>

                    <th>Name</th>

                    <th>Username</th>

                    <th>Role</th>

                    <th>Status</th>

                    <th></th>

                </tr>

            </thead>

            <tbody id="usersTable">

                <tr>

                    <td colspan="5">

                        Loading...

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <!-- ======================================
     User Editor
====================================== -->

<div id="userEditor" class="user-editor">

    <div class="editor-header">

        <h2>User Details</h2>

        <button id="closeEditor">✕</button>

    </div>

    <div class="editor-body">

        <label>Full Name</label>

        <input
            type="text"
            id="editFullName">

        <label>Username</label>

        <input
            type="text"
            id="editUsername">

        <label>Role</label>

        <select id="editRole">

            <option value="">Loading...</option>

        </select>

        <label>Status</label>

        <select id="editStatus">

            <option value="true">

                Active

            </option>

            <option value="false">

                Disabled

            </option>

        </select>

        <div class="editor-buttons">

            <button id="saveUserBtn"
                    class="primary-btn">

                Save

            </button>

            <button id="resetPasswordBtn">

                Reset Password

            </button>

        </div>

    </div>
<hr style="margin:25px 0;opacity:.25;">

<h2>Create User</h2>

<label>Full Name</label>
<input type="text" id="newFullName">

<label>Username</label>
<input type="text" id="newUsername">

<label>Role</label>
<select id="newRole">
    <option value="">Loading...</option>
</select>

<button id="createUserBtn" class="primary-btn">
    Create User
</button>

<div id="newUserPassword"></div>
</div>

</div>
