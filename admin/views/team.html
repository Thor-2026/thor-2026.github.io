<div class="page-header">

    <h1>👥 Team Management</h1>

    <button
        id="newUserBtn"
        class="primary-btn"
        type="button">

        + New User

    </button>

</div>

<section class="team-view">

    <table class="team-table">

        <thead>

            <tr>

                <th>Name</th>
                <th>Username</th>
                <th>Role</th>
                <th>Status</th>
                <th></th>

            </tr>

        </thead>

        <tbody id="usersTable">

            <tr>

                <td colspan="5">

                    Loading users...

                </td>

            </tr>

        </tbody>

    </table>

</section>

<aside
    id="userEditor"
    class="user-editor">

    <div class="editor-header">

        <h2 id="editorTitle">

            Edit User

        </h2>

        <button
            id="closeEditor"
            type="button">

            ✕

        </button>

    </div>

    <div class="editor-body">

        <!-- EDIT MODE -->

        <div id="editUserSection">

            <label for="editFullName">

                Full Name

            </label>

            <input
                id="editFullName"
                type="text">

            <label for="editUsername">

                Username

            </label>

            <input
                id="editUsername"
                type="text">

            <label for="editRole">

                Role

            </label>

            <select id="editRole">

                <option>Loading...</option>

            </select>

            <label for="editStatus">

                Status

            </label>

            <select id="editStatus">

                <option value="true">

                    Active

                </option>

                <option value="false">

                    Disabled

                </option>

            </select>

            <div class="editor-buttons">

                <button
                    id="saveUserBtn"
                    class="primary-btn"
                    type="button">

                    Save Changes

                </button>

                <button
                    id="resetPasswordBtn"
                    type="button">

                    Reset Password

                </button>

            </div>

        </div>

        <!-- CREATE MODE -->

        <div
            id="createUserSection"
            style="display:none;">

            <label for="newFullName">

                Full Name

            </label>

            <input
                id="newFullName"
                type="text">

            <label for="newUsername">

                Username

            </label>

            <input
                id="newUsername"
                type="text">

            <label for="newRole">

                Role

            </label>

            <select id="newRole">

                <option>Loading...</option>

            </select>

            <div class="editor-buttons">

                <button
                    id="createUserBtn"
                    class="primary-btn"
                    type="button">

                    Create User

                </button>

            </div>

            <div id="newUserPassword"></div>

        </div>

    </div>

</aside>
