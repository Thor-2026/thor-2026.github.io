<div class="page-header">

    <h1>📜 Activity Log</h1>

    <button
        id="refreshActivityBtn"
        class="primary-btn"
        type="button">

        Refresh

    </button>

</div>

<div class="activity-toolbar">

    <input
        type="text"
        id="activitySearch"
        placeholder="Search user, module or action...">

</div>

<div class="activity-card">

    <table class="activity-table">

        <thead>

            <tr>

                <th>Date / Time</th>

                <th>User</th>

                <th>Module</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody id="activityTable">

            <tr>

                <td colspan="4">

                    Loading activity...

                </td>

            </tr>

        </tbody>

    </table>

</div>
