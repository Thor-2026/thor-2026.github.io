<div class="page-header">

    <h1>🔐 Permissions</h1>

    <button
        id="savePermissionsBtn"
        class="primary-btn"
        type="button">

        Save Permissions

    </button>

</div>

<div class="permissions-layout">

    <div class="permissions-sidebar">

        <h2>Users</h2>

        <div id="permissionsUserList">

            Loading users...

        </div>

    </div>

    <div class="permissions-content">

        <div class="permissions-header">

            <h2 id="selectedPermissionUserName">

                Select a user

            </h2>

            <p>

                Configure module access for the selected user.

            </p>

        </div>

        <table class="permissions-table">

            <thead>

                <tr>

                    <th>Module</th>
                    <th>View</th>
                    <th>Create</th>
                    <th>Edit</th>
                    <th>Delete</th>

                </tr>

            </thead>

            <tbody id="permissionsTable">

                <tr>

                    <td colspan="5">

                        Select a user to load permissions.

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
