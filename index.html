<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyDisplay</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="wrapper">

<header>

<div class="company">

<img src="assets/logo.png" id="logo">

<h1>SHIFT SCHEDULE</h1>

</div>

<div class="datetime">

<div id="clock">00:00:00</div>

<div id="date">Loading...</div>

</div>

</header>

<main>

<section class="schedule">

<img src="schedule/schedule.png?v=1"
id="scheduleImage"
alt="Schedule">

</section>

<aside>

<div class="card">

<h2>Weather</h2>

<div id="weatherIcon">☀️</div>

<div id="temperature">--°C</div>

<div id="weatherText">Loading...</div>

</div>

<div class="card">

<h2>Announcements</h2>

<ul id="announcements">

<li>Welcome</li>

<li>Wear PPE</li>

<li>Stay Safe</li>

</ul>

</div>

</aside>

</main>

<footer>

<div class="ticker">

<div id="tickerText">

Welcome • Stay Safe • Have a Great Shift • Follow Safety Procedures • Report Hazards Immediately

</div>

</div>

</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="script.js"></script>

</body>

</html>
