<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyDisplay</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="wrapper">

<header>

<div class="company">

<img
id="logo"
src=""
alt="Company Logo">

<div>

<h3 id="companyName" class="company-name">

THOR DISPLAY

</h3>

<h1 id="displayTitle">

SHIFT SCHEDULE

</h1>

<p id="welcomeText">

Welcome

</p>

</div>

</div>

<div class="datetime">

<div id="clock">00:00:00</div>

<div id="date">Loading...</div>

</div>

</header>

<main>

<section class="schedule">

<img
id="scheduleImage"
src=""
alt="Schedule">

</section>

<aside>

<div class="card">
  
<h2>🌤 Weather</h2>

<div id="weatherCity"
style="font-size:18px;font-weight:bold;color:#FFD54F;margin-bottom:8px;">
📍 Loading...
</div>

<div id="weatherIcon"
style="font-size:56px;">
☀️
</div>

<div id="temperature"
style="font-size:40px;font-weight:bold;">
--°C
</div>

<div id="weatherText"
style="font-size:18px;margin-top:8px;">
Loading...
</div>

<div id="weatherUpdated"
style="margin-top:12px;font-size:14px;opacity:.8;">
Updated: --
</div>


</div>

<div class="card">

<h2>Announcements</h2>

<ul id="announcements">

<li>Welcome</li>

<li>Wear PPE</li>

<li>Stay Safe</li>

</ul>

</div>

</aside>

</main>

<footer>

<div class="ticker">

<div id="tickerText">

Welcome • Stay Safe • Have a Great Shift • Follow Safety Procedures • Report Hazards Immediately

</div>

</div>

</footer>

</div>

<!-- Navigation Buttons in Bottom Corner -->
<div style="position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000;">
    <a href="admin/dashboard.html?view=labels" id="labelsButton" style="background: #28a745; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; font-family: sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px;">
        📋 Label Inventory
    </a>
    <a href="admin/login.html" id="adminButton" style="background: #333; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; font-family: sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px;">
        ⚙ Admin
    </a>
</div>
  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/settings.js"></script>

<script src="js/clock.js"></script>

<script src="js/weather.js"></script>

<script src="js/announcements.js"></script>

<script src="js/ticker.js"></script>

<script src="js/branding.js"></script>

<script src="js/schedule.js"></script>

<script src="js/displayManager.js"></script>

<script src="js/script.js"></script>
</body>

</html>
